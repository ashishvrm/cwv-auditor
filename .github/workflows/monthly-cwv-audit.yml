name: Monthly CWV Audit

on:
  schedule:
    # Run at 6:00 AM UTC on the 1st of every month
    - cron: '0 6 1 * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts
        run: npm install

      - name: Run CWV Audit
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: npx tsx run-audit.ts

      - name: Log completion
        if: success()
        run: echo "CWV Audit completed successfully at $(date)"

      - name: Log failure
        if: failure()
        run: echo "CWV Audit FAILED at $(date)"
